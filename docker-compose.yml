services:
  db:
    image: postgres:16-alpine
    container_name: certifica_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-certifica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-certifica_secret}
      POSTGRES_DB: ${POSTGRES_DB:-certifica_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-certifica}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backendCertifica
    container_name: certifica_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-certifica}:${POSTGRES_PASSWORD:-certifica_secret}@db:5432/${POSTGRES_DB:-certifica_db}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backendCertifica/app:/app/app

volumes:
  postgres_data:
